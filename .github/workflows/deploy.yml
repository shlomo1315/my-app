name: Trigger Vercel Production Deploy

# מבטיח פריסת פרודקשן בכל push ל-main (מעקף לדילוגי בנייה של Vercel Hobby)
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel Deploy Hook
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" ]; then
            echo "Triggering Vercel production deploy…"
            curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" -o /dev/null -w "HTTP %{http_code}\n"
          else
            echo "VERCEL_DEPLOY_HOOK_URL secret not set — skipping (Vercel git auto-deploy still applies)."
          fi
